title: Grafana & Datadog → Elastic Serverless (migration workshop)
teaser: Twenty Grafana + ten Datadog dashboards (plus monitors)—CLI volume, Cursor,
  and Elastic Agent Skills toward Observability Serverless.
description: |
  A **two-lab** migration spike sized like a real program: **20** Grafana dashboards and **10** Datadog-style
  **dashboard** JSON files, plus **4** Datadog **monitor** samples—**30+** dashboard-class artifacts before you even count
  alert drafts.

  **Lab 1** batch-converts all Grafana exports (`tools/grafana_to_elastic.py`) and expects learners to use **Cursor** and
  [Elastic Agent Skills](https://github.com/elastic/agent-skills) (**`kibana-dashboards`**) to refine and publish in **Kibana**.

  **Lab 2** uses `tools/datadog_dashboard_to_elastic.py` for dashboards and `tools/datadog_to_elastic_alert.py` for monitors,
  with the same **AI + skills** pattern for **rules** and **dashboards** on **Observability Serverless**.

  The sandbox is a single **elastic/es3-api-v2** host: it **creates** an Observability Serverless project at track start,
  proxies **Kibana** on port **8080**, and includes the workshop repo (Python venv + **assets/**) for the CLIs.
