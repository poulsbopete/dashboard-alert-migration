type: track
title: Grafana & Datadog → Elastic Serverless (migration workshop)
teaser: Spike-focused track for dashboards and alerts—Prometheus/Grafana, Datadog-style
  exports, OTLP, and CLI-first automation toward Elastic Observability Serverless.
description: |
  This hands-on track mirrors a short **migration spike**: move **Grafana (Prometheus-backed)** dashboards and
  **Datadog-style** monitors toward **Elastic Observability Serverless**. Elastic’s **native PromQL** support reduces
  friction for Grafana panels versus a full query-language rewrite; **alerting** still needs pragmatic mapping (for
  example ES|QL-backed rules, query rules, or ML) because there is not always a one-step “pure ES|QL alert” equivalent
  for every legacy monitor.

  You will use a **CLI-first** workflow (Python utilities in `tools/`) for fast iteration, optional **AI / Agent
  Skills** for repeatable operations, and a small **Kubernetes** sandbox (`sample-api`) that emits metrics, logs, and
  traces through **OpenTelemetry Collector** and **Grafana Alloy**.
