title: PayPal-Style Observability Migration to Elastic Serverless
teaser: Migrate Grafana (Prometheus/Alloy) and Datadog-style monitors into Elastic
  Serverless with OpenTelemetry and Agent Skills.
description: |
  Hands-on migration workshop simulating a large-scale merchant payments platform. You deploy lightweight Kubernetes
  (k3s), OpenTelemetry Collector, Grafana Alloy, and a sample payment service emitting metrics, logs, and traces.
  Labs cover Grafana dashboard migration (PromQL and Elastic-native paths), Datadog-style monitor conversion, Agent
  Skills automation, high-cardinality optimization, and unified correlation in Elastic Observability Serverless.

  **Note:** After pulling this repository, run `instruqt track create` or assign a real `id` and `owner` before pushing
  to the Instruqt platform. This track is modeled on the structure of `elastic-autonomous-observability` but is a
  standalone, open-source artifact (the upstream track is not publicly cloneable).
