global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: parity-rig
    replica: A

scrape_configs:
  - job_name: express-app
    static_configs:
      - targets:
          - producer:3000
        labels:
          # The producer's `__address__` becomes the `instance` label by
          # default; pin it explicitly so Grafana sees a stable value across
          # compose restarts.
          instance: express-1:3000

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          # Stable instance label so the Node Exporter Full dashboard's
          # variable resolution lands on a known target across restarts.
          instance: node-1:9100

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          instance: prometheus-1:9090

  - job_name: producer-synth-k8s
    # The producer also exposes a /metrics-k8s endpoint with synthesized
    # kube_* and container_* metrics. Scraped as a separate job so the
    # kube-state-metrics + cadvisor-style series are available with the
    # right `__name__` / `job` shape the Kubernetes / Views / Global
    # dashboard expects.
    metrics_path: /metrics-k8s
    static_configs:
      - targets:
          - producer:3000
        labels:
          instance: ksm-1:8080
          job: kube-state-metrics

  - job_name: producer-synth-node-extras
    # /metrics-node-extras exposes the node-exporter metrics the
    # producer's container kernel can't expose itself (hwmon, thermal,
    # schedstat with CONFIG_SCHEDSTATS, /proc/meminfo lines like
    # HardwareCorrupted / DirectMap1G, systemd unit states, custom
    # textfile exports). Scraped under the same node-exporter job
    # label so the Node Exporter Full dashboard's `job="node-exporter"`
    # filters pass through.
    metrics_path: /metrics-node-extras
    static_configs:
      - targets:
          - producer:3000
        labels:
          instance: node-1:9100
          job: node-exporter

# Native Elastic /_prometheus remote_write receiver: lands docs in
# metrics-{dataset}.prometheus-{namespace} with a layout the ES|QL PROMQL
# command can resolve directly. The placeholder secrets are filled in at
# compose-up time via envsubst-style ${VAR} expansion done by docker-compose
# (env_file: ../serverless_creds.env exposes ELASTICSEARCH_ENDPOINT and KEY).
# Substituted at container startup by ./prometheus/entrypoint.sh which fills
# in ELASTICSEARCH_ENDPOINT and KEY from the env_file passed to the
# Prometheus service in docker-compose.
remote_write:
  - url: "__ES_URL__/_prometheus/metrics/express/parity/api/v1/write"
    authorization:
      type: ApiKey
      credentials: "__KEY__"
    queue_config:
      max_samples_per_send: 1000
      capacity: 10000
      batch_send_deadline: 5s
