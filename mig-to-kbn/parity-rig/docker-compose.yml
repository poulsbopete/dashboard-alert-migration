services:
  producer:
    build: ./producer
    container_name: parity-producer
    networks:
      - rig
    ports:
      - "27300:3000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3000/healthz').read()==b'ok' else 1)\""]
      interval: 5s
      retries: 5

  # Real node-exporter scraped by Prometheus. Gives us authentic
  # node_cpu_*, node_memory_*, node_disk_*, node_network_*,
  # node_filesystem_*, node_hwmon_*, node_load*, etc. so the
  # Node Exporter Full dashboard (1860) works end-to-end. On macOS
  # Docker Desktop the container's /proc only sees the container's
  # own kernel namespace, so values reflect the container's view of
  # the host kernel — that's fine for parity (Prometheus sees the
  # same view and Elastic ingests the same numbers via remote_write).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: parity-node-exporter
    command:
      - --collector.disable-defaults
      - --collector.cpu
      - --collector.meminfo
      - --collector.diskstats
      - --collector.filesystem
      - --collector.loadavg
      - --collector.netdev
      - --collector.netstat
      - --collector.uname
      - --collector.vmstat
      - --collector.time
      - --collector.stat
      - --collector.hwmon
      # Extra collectors enabled to feed Node Exporter Full panels that
      # used to fail with ``Unknown column [...]`` against the rig. Each
      # one reads a /proc or sysfs path that Docker Desktop's macOS VM
      # exposes inside the container.
      - --collector.processes
      - --collector.entropy
      - --collector.filefd
      - --collector.sockstat
      - --collector.softnet
      - --collector.netclass
      - --collector.conntrack
      - --collector.schedstat
      - --collector.pressure
      - --collector.cpufreq
      - --collector.thermal_zone
      - --collector.timex
    networks:
      - rig
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: parity-prometheus
    entrypoint: /etc/prometheus/entrypoint.sh
    environment:
      ELASTICSEARCH_ENDPOINT: ${ELASTICSEARCH_ENDPOINT}
      KEY: ${KEY}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
    networks:
      - rig
    ports:
      - "29090:9090"
    depends_on:
      producer:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.3.1
    container_name: parity-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - rig
    ports:
      - "23000:3000"
    depends_on:
      prometheus:
        condition: service_started

networks:
  rig:
    name: parity-rig
