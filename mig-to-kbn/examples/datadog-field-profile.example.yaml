# Example declarative field profile for the Datadog migration CLI

name: custom_otel_serverless
metric_index: metrics-*
logs_index: logs-*
log_index_map:
  main: logs-generic-default
timestamp_field: "@timestamp"
metrics_dataset_filter: ""
logs_dataset_filter: ""

metric_map:
  system.cpu.user: system.cpu.user.pct
  system.mem.usable: system.memory.actual.used.bytes
  trace.flask.request.hits: trace.flask.request.hits
  nginx.requests.total_count: nginx.requests.total_count

tag_map:
  host: host.name
  env: deployment.environment
  service: service.name
  status: log.level
  kube_namespace: kubernetes.namespace
  datacenter: cloud.region

metric_prefix: ""
metric_suffix: ""
tag_prefix: ""
