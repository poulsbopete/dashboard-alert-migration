name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for trusted publishing
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # Temporarily disabled: PyPI Trusted Publishing is not yet configured for
      # this project (publish fails with `invalid-publisher`). Re-enable once a
      # trusted publisher is set up for the `pypi` environment on PyPI.
      # See https://docs.pypi.org/trusted-publishers/
      - name: Publish to PyPI (Trusted Publishing)
        if: ${{ false }}
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Attach artifacts + SBOM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            docs/licenses/sbom.cdx.json
