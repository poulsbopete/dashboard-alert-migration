repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args:
          - --config=gitleaks.toml
          - --no-banner
  - repo: local
    hooks:
      - id: source-headers
        name: Source license headers
        entry: python3 scripts/check_source_headers.py
        language: system
        pass_filenames: false
      - id: ruff
        name: Ruff
        entry: .venv/bin/python -m ruff check
        language: system
        types: [python]
      - id: pytest-quick
        name: Pytest quick smoke
        entry: .venv/bin/python -m pytest tests/test_app_cli.py -q
        language: system
        pass_filenames: false
        files: ^(observability_migration/|tests/|scripts/|pyproject\.toml|uv\.lock)
      - id: no-local-paths
        name: No hardcoded local machine paths
        entry: python3 scripts/check_local_paths.py
        language: system
        pass_filenames: false
