# Copy to otel-collector-elastic-secret.yaml (gitignored locally) or apply with kubectl create secret.
# Lab 1 uses scripts/apply_elastic_otlp.sh to create the secret from environment variables.
apiVersion: v1
kind: Secret
metadata:
  name: elastic-otel
  namespace: merchant-o11y
type: Opaque
stringData:
  ELASTIC_OTLP_ENDPOINT: "https://YOUR_PROJECT.otlp.observability.elastic.cloud:443"
  ELASTIC_OTLP_AUTH: "ApiKey YOUR_ENCODED_API_KEY"
