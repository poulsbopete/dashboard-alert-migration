# Build slides/ (Vite + React) and deploy to GitHub Pages.
# Repo settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy slides to GitHub Pages

# Run on all pushes to main so Pages deploys after enabling “GitHub Actions” as the source,
# even when recent commits only touched docs/tools (path-only triggers often skip those).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install and build
        working-directory: slides
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: slides/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
